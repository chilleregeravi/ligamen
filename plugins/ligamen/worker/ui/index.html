<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ligamen — Service Dependency Graph</title>
    <!-- D3 force simulation loaded via ESM CDN in force-worker.js: cdn.jsdelivr.net/npm/d3-force@3/+esm -->
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: #1a1f2e;
        border-bottom: 1px solid #2d3748;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      #toolbar h1 {
        font-size: 14px;
        font-weight: 600;
        color: #63b3ed;
      }
      #search {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        width: 180px;
      }
      #search::placeholder {
        color: #718096;
      }
      #filters {
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }
      .filter-label {
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        user-select: none;
      }
      .filter-label input {
        cursor: pointer;
        accent-color: #63b3ed;
      }
      #node-info {
        padding: 4px 8px;
        font-size: 11px;
        color: #a0aec0;
        margin-left: auto;
        white-space: nowrap;
      }
      #canvas-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      canvas {
        display: block;
        cursor: grab;
      }
      canvas:active {
        cursor: grabbing;
      }
      #tooltip {
        position: absolute;
        background: #1a1f2e;
        border: 1px solid #4a5568;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        color: #e2e8f0;
        pointer-events: none;
        display: none;
        white-space: nowrap;
        z-index: 10;
      }
      #project-picker {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1f2e;
        border: 1px solid #4a5568;
        border-radius: 8px;
        padding: 24px 32px;
        z-index: 20;
        min-width: 400px;
        max-width: 600px;
      }
      #project-picker h2 {
        font-size: 16px;
        margin-bottom: 16px;
        color: #63b3ed;
      }
      #project-picker .project-item {
        display: block;
        width: 100%;
        padding: 10px 14px;
        margin-bottom: 8px;
        background: #2d3748;
        border: 1px solid #4a5568;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 13px;
        cursor: pointer;
        text-align: left;
        transition: border-color 0.15s;
      }
      #project-picker .project-item:hover {
        border-color: #63b3ed;
      }
      #project-picker .project-item .project-path {
        font-size: 11px;
        color: #718096;
        margin-top: 4px;
      }
      #project-picker .project-item .project-stats {
        font-size: 11px;
        color: #a0aec0;
        margin-top: 2px;
      }
      #project-picker .no-projects {
        color: #718096;
        font-size: 13px;
      }
      #detail-panel {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 320px;
        max-height: calc(100% - 16px);
        overflow-y: auto;
        background: #1a1f2e;
        border: 1px solid #4a5568;
        border-radius: 8px;
        padding: 16px;
        font-size: 12px;
        display: none;
        z-index: 15;
      }
      #detail-close {
        position: absolute;
        top: 8px;
        right: 12px;
        cursor: pointer;
        font-size: 18px;
        color: #718096;
        line-height: 1;
      }
      #detail-close:hover {
        color: #e2e8f0;
      }
      #detail-panel h3 {
        font-size: 15px;
        color: #63b3ed;
        margin-bottom: 8px;
      }
      #detail-panel .detail-section {
        margin-bottom: 12px;
      }
      #detail-panel .detail-label {
        color: #718096;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      #detail-panel .detail-value {
        color: #e2e8f0;
      }
      #detail-panel .connection-item {
        padding: 6px 8px;
        background: #2d3748;
        border-radius: 4px;
        margin-bottom: 4px;
      }
      #detail-panel .connection-item .conn-direction {
        color: #718096;
        font-size: 10px;
      }
      #detail-panel .conn-method {
        color: #68d391;
        font-weight: 600;
      }
      #detail-panel .conn-path {
        color: #f6ad55;
      }
      #detail-panel .conn-target {
        color: #63b3ed;
      }
      #detail-panel .conn-file {
        color: #718096;
        font-size: 10px;
        margin-top: 2px;
      }
      #legend {
        display: flex;
        gap: 10px;
        align-items: center;
        font-size: 11px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }
      #project-select {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        max-width: 200px;
        cursor: pointer;
      }
      #fit-btn,
      #export-btn {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      #fit-btn:hover,
      #export-btn:hover {
        border-color: #63b3ed;
      }
      #changes-btn {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      #changes-btn:hover,
      #changes-btn.active {
        border-color: #f6e05e;
        color: #f6e05e;
      }
      .log-panel {
        flex-shrink: 0;
        background: #0d1117;
        border-top: 1px solid #2d3748;
        display: flex;
        flex-direction: column;
        transition: height 0.2s ease;
        height: 32px;        /* collapsed: just the header */
        overflow: hidden;
      }
      .log-panel--open {
        height: 240px;       /* expanded */
      }
      .log-panel__header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        height: 32px;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
        background: #1a1f2e;
        border-bottom: 1px solid #2d3748;
      }
      .log-panel__title {
        font-size: 12px;
        font-weight: 600;
        color: #a0aec0;
        white-space: nowrap;
      }
      .log-panel__controls {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-left: 8px;
      }
      .log-select {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
      }
      .log-search {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        width: 160px;
      }
      .log-search::placeholder {
        color: #718096;
      }
      .log-btn {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #a0aec0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
      }
      .log-btn:hover {
        border-color: #63b3ed;
        color: #e2e8f0;
      }
      .log-panel__chevron {
        margin-left: auto;
        font-size: 10px;
        color: #718096;
        transition: transform 0.2s ease;
      }
      .log-panel--open .log-panel__chevron {
        transform: rotate(180deg);
      }
      .log-panel__body {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
        font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
        font-size: 11px;
        line-height: 1.5;
      }
      .log-line {
        padding: 1px 12px;
        white-space: pre-wrap;
        word-break: break-all;
        color: #a0aec0;
      }
      .log-line--error {
        color: #fc8181;
      }
      .log-line--warn {
        color: #f6ad55;
      }
      .log-line--info {
        color: #a0aec0;
      }
      .log-line--hidden {
        display: none;
      }
      #filters-btn {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      #filters-btn:hover,
      #filters-btn.active {
        border-color: #63b3ed;
        color: #63b3ed;
      }
      #filter-panel {
        background: #1a1f2e;
        border-bottom: 1px solid #2d3748;
        padding: 10px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        flex-shrink: 0;
      }
      .filter-section {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 100px;
      }
      .filter-section-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #718096;
        margin-bottom: 2px;
      }
      #filter-boundary,
      #filter-language {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 3px 6px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        min-width: 80px;
      }
    </style>
  </head>
  <body>
    <div id="project-picker" style="display: none">
      <h2>Select a Project</h2>
      <div id="project-list"></div>
    </div>
    <div id="toolbar">
      <h1>Ligamen Service Graph</h1>
      <select id="project-select" style="display: none"></select>
      <input
        id="search"
        type="text"
        placeholder="Filter services..."
        autocomplete="off"
      />
      <button id="fit-btn" title="Fit all nodes to screen">Fit</button>
      <button id="export-btn" title="Download current view as PNG">Export PNG</button>
      <button id="changes-btn" class="active" title="Toggle what-changed overlay">Changes</button>
      <button id="filters-btn">Filters</button>
      <span id="node-info">Loading...</span>
    </div>
    <div id="filter-panel" style="display: none;">
      <!-- populated by filter-panel.js in plan 02 -->
      <div class="filter-section">
        <span class="filter-section-label">Protocol</span>
        <label class="filter-label"><input type="checkbox" data-protocol="rest" checked /> REST</label>
        <label class="filter-label"><input type="checkbox" data-protocol="grpc" checked /> gRPC</label>
        <label class="filter-label"><input type="checkbox" data-protocol="events" checked /> Events</label>
        <label class="filter-label"><input type="checkbox" data-protocol="sdk" checked /> SDK</label>
        <label class="filter-label"><input type="checkbox" data-protocol="internal" checked /> Internal</label>
      </div>
      <div class="filter-section">
        <span class="filter-section-label">Layer</span>
        <label class="filter-label"><input type="checkbox" data-layer="services" checked /> Services</label>
        <label class="filter-label"><input type="checkbox" data-layer="libraries" checked /> Libraries</label>
        <label class="filter-label"><input type="checkbox" data-layer="infra" checked /> Infra</label>
        <label class="filter-label"><input type="checkbox" data-layer="external" checked /> External</label>
      </div>
      <div class="filter-section">
        <span class="filter-section-label">Show</span>
        <label class="filter-label"><input type="checkbox" id="filter-mismatches-only" /> Mismatches only</label>
        <label class="filter-label"><input type="checkbox" id="filter-hide-isolated" /> Hide isolated nodes</label>
      </div>
      <div class="filter-section">
        <span class="filter-section-label">Boundary</span>
        <select id="filter-boundary"><option value="">All</option></select>
      </div>
      <div class="filter-section">
        <span class="filter-section-label">Language</span>
        <select id="filter-language"><option value="">All</option></select>
      </div>
    </div>
    <div id="canvas-container">
      <canvas id="graph-canvas"></canvas>
      <div id="tooltip"></div>
      <div id="detail-panel">
        <div id="detail-close">&times;</div>
        <div id="detail-content"></div>
      </div>
    </div>
    <div id="log-panel" class="log-panel log-panel--collapsed">
      <div id="log-panel-header" class="log-panel__header">
        <span class="log-panel__title">Worker Logs</span>
        <div class="log-panel__controls">
          <select id="log-component-filter" class="log-select">
            <option value="all">All components</option>
            <option value="worker">worker</option>
            <option value="http">http</option>
            <option value="mcp">mcp</option>
            <option value="scan">scan</option>
          </select>
          <input id="log-search" type="text" class="log-search" placeholder="Filter logs..." autocomplete="off" />
          <button id="log-clear" class="log-btn">Clear</button>
        </div>
        <span class="log-panel__chevron" id="log-chevron">&#9650;</span>
      </div>
      <div id="log-lines" class="log-panel__body"></div>
    </div>
    <script type="module" src="./graph.js"></script>
  </body>
</html>
