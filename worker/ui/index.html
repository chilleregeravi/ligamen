<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AllClear — Service Dependency Graph</title>
    <!-- D3 force simulation loaded via ESM CDN in force-worker.js: cdn.jsdelivr.net/npm/d3-force@3/+esm -->
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: #1a1f2e;
        border-bottom: 1px solid #2d3748;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      #toolbar h1 {
        font-size: 14px;
        font-weight: 600;
        color: #63b3ed;
      }
      #search {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        width: 180px;
      }
      #search::placeholder {
        color: #718096;
      }
      #filters {
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }
      .filter-label {
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        user-select: none;
      }
      .filter-label input {
        cursor: pointer;
        accent-color: #63b3ed;
      }
      #node-info {
        padding: 4px 8px;
        font-size: 11px;
        color: #a0aec0;
        margin-left: auto;
        white-space: nowrap;
      }
      #canvas-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      canvas {
        display: block;
        cursor: grab;
      }
      canvas:active {
        cursor: grabbing;
      }
      #tooltip {
        position: absolute;
        background: #1a1f2e;
        border: 1px solid #4a5568;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        color: #e2e8f0;
        pointer-events: none;
        display: none;
        white-space: nowrap;
        z-index: 10;
      }
      #project-picker {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1f2e;
        border: 1px solid #4a5568;
        border-radius: 8px;
        padding: 24px 32px;
        z-index: 20;
        min-width: 400px;
        max-width: 600px;
      }
      #project-picker h2 {
        font-size: 16px;
        margin-bottom: 16px;
        color: #63b3ed;
      }
      #project-picker .project-item {
        display: block;
        width: 100%;
        padding: 10px 14px;
        margin-bottom: 8px;
        background: #2d3748;
        border: 1px solid #4a5568;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 13px;
        cursor: pointer;
        text-align: left;
        transition: border-color 0.15s;
      }
      #project-picker .project-item:hover {
        border-color: #63b3ed;
      }
      #project-picker .project-item .project-path {
        font-size: 11px;
        color: #718096;
        margin-top: 4px;
      }
      #project-picker .project-item .project-stats {
        font-size: 11px;
        color: #a0aec0;
        margin-top: 2px;
      }
      #project-picker .no-projects {
        color: #718096;
        font-size: 13px;
      }
      #detail-panel {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 320px;
        max-height: calc(100% - 16px);
        overflow-y: auto;
        background: #1a1f2e;
        border: 1px solid #4a5568;
        border-radius: 8px;
        padding: 16px;
        font-size: 12px;
        display: none;
        z-index: 15;
      }
      #detail-close {
        position: absolute;
        top: 8px;
        right: 12px;
        cursor: pointer;
        font-size: 18px;
        color: #718096;
        line-height: 1;
      }
      #detail-close:hover {
        color: #e2e8f0;
      }
      #detail-panel h3 {
        font-size: 15px;
        color: #63b3ed;
        margin-bottom: 8px;
      }
      #detail-panel .detail-section {
        margin-bottom: 12px;
      }
      #detail-panel .detail-label {
        color: #718096;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      #detail-panel .detail-value {
        color: #e2e8f0;
      }
      #detail-panel .connection-item {
        padding: 6px 8px;
        background: #2d3748;
        border-radius: 4px;
        margin-bottom: 4px;
      }
      #detail-panel .connection-item .conn-direction {
        color: #718096;
        font-size: 10px;
      }
      #detail-panel .conn-method {
        color: #68d391;
        font-weight: 600;
      }
      #detail-panel .conn-path {
        color: #f6ad55;
      }
      #detail-panel .conn-target {
        color: #63b3ed;
      }
      #detail-panel .conn-file {
        color: #718096;
        font-size: 10px;
        margin-top: 2px;
      }
      #project-select {
        background: #2d3748;
        border: 1px solid #4a5568;
        color: #e2e8f0;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        max-width: 200px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="project-picker" style="display: none">
      <h2>Select a Project</h2>
      <div id="project-list"></div>
    </div>
    <div id="toolbar">
      <h1>AllClear Service Graph</h1>
      <select id="project-select" style="display: none"></select>
      <input
        id="search"
        type="text"
        placeholder="Filter services..."
        autocomplete="off"
      />
      <div id="filters">
        <span>Protocol:</span>
        <label class="filter-label"
          ><input type="checkbox" data-protocol="rest" checked /> REST</label
        >
        <label class="filter-label"
          ><input type="checkbox" data-protocol="grpc" checked /> gRPC</label
        >
        <label class="filter-label"
          ><input type="checkbox" data-protocol="events" checked />
          Events</label
        >
        <label class="filter-label"
          ><input type="checkbox" data-protocol="internal" checked />
          Internal</label
        >
      </div>
      <span id="node-info">Loading...</span>
    </div>
    <div id="canvas-container">
      <canvas id="graph-canvas"></canvas>
      <div id="tooltip"></div>
      <div id="detail-panel">
        <div id="detail-close">&times;</div>
        <div id="detail-content"></div>
      </div>
    </div>
    <script type="module" src="./graph.js"></script>
  </body>
</html>
